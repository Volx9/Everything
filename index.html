<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E0F11">
<title>Everything — Agenda Personale</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F11;
    --surface:#1A1B1E;
    --surface-2:#232427;
    --border:#2A2C30;
    --text:#EDEDE8;
    --text-dim:#8B8C90;
    --ember:#E3A857;
    --ember-glow:#F2C077;
    --ember-dim:#6B5636;
    --danger:#C0574F;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family:'Inter',-apple-system,sans-serif;
    overscroll-behavior:none;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    font-weight:500;
    letter-spacing:-0.01em;
  }

  /* ---------- SPLASH ---------- */
  #splash{
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px; text-align:center;
    background:
      radial-gradient(circle at 50% 30%, rgba(227,168,87,0.10), transparent 60%),
      var(--bg);
    transition:opacity .6s ease, visibility .6s ease;
  }
  #splash.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  #splash .mark{
    width:46px; height:46px; margin-bottom:28px;
    opacity:.9;
  }
  #splash .wordmark{
    font-size:11px; color:var(--text-dim);
    letter-spacing:.28em; text-transform:uppercase;
    margin-bottom:22px;
  }
  #splash .quote{
    font-family:'Fraunces',serif;
    font-size:22px; line-height:1.45; font-weight:500;
    max-width:320px; color:var(--text);
  }
  #splash .quote::before{ content:"\201C"; color:var(--ember); }
  #splash .quote::after{ content:"\201D"; color:var(--ember); }
  #splash .hint{
    margin-top:36px; font-size:12px; color:var(--text-dim);
    letter-spacing:.08em; text-transform:uppercase;
  }

  /* ---------- APP SHELL ---------- */
  #app{
    display:flex; flex-direction:column;
    height:100%;
    opacity:0; transition:opacity .5s ease;
  }
  #app.visible{ opacity:1; }

  header.top{
    padding:calc(var(--safe-top) + 20px) 22px 14px;
    display:flex; flex-direction:column; gap:2px;
  }
  header.top .wordmark{
    font-size:10px; color:var(--text-dim);
    letter-spacing:.28em; text-transform:uppercase;
    margin-bottom:4px;
  }
  header.top .greeting{ font-size:22px; }
  header.top .date{ font-size:13px; color:var(--text-dim); text-transform:capitalize; }

  main{
    flex:1; overflow-y:auto;
    padding:6px 18px calc(90px + var(--safe-bottom));
  }

  section.view{ display:none; }
  section.view.active{ display:block; animation:fade .35s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ---------- STREAK ---------- */
  .section-title{
    font-size:14px; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.08em;
    margin:18px 4px 10px;
  }
  .add-goal{
    display:flex; gap:8px; margin:4px 4px 18px;
  }
  .add-goal input{
    flex:1; background:var(--surface); border:1px solid var(--border);
    color:var(--text); border-radius:12px; padding:13px 14px;
    font-size:15px; font-family:'Inter',sans-serif;
  }
  .add-goal input::placeholder{ color:var(--text-dim); }
  .add-goal button{
    background:var(--ember); color:#1a1408; border:none;
    border-radius:12px; padding:0 18px; font-weight:600; font-size:14px;
  }
  .goal-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:16px; margin-bottom:12px;
    display:flex; flex-direction:column;
  }
  .goal-top{ display:flex; align-items:center; gap:14px; }
  .flame{
    width:46px; height:46px; flex:none; position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .flame svg{ width:100%; height:100%; }
  .flame-badge{
    position:absolute; width:62%; height:62%; border-radius:50%;
    background:var(--bg); box-shadow:0 0 0 1px var(--border);
    display:flex; align-items:center; justify-content:center;
  }
  .flame .count{
    font-family:'Fraunces',serif; font-weight:600;
    font-size:16px; line-height:1;
  }
  .goal-info{ flex:1; min-width:0; }
  .goal-info .name{ font-size:15px; font-weight:600; }
  .goal-info .meta{ font-size:12px; color:var(--text-dim); margin-top:2px; }
  .goal-info .meta.risk{ color:var(--danger); }
  .goal-actions{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .check-btn{
    width:38px; height:38px; border-radius:50%;
    border:2px solid var(--ember-dim); background:transparent;
    color:var(--ember); font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .check-btn.done{ background:var(--ember); border-color:var(--ember); color:#1a1408; }
  .del-btn{ background:none; border:none; color:var(--text-dim); font-size:11px; }

  .heatmap{
    display:grid; grid-template-columns:repeat(10, 1fr); gap:4px;
    margin-top:16px; padding-top:14px; border-top:1px solid var(--border);
  }
  .heatmap-cell{
    aspect-ratio:1; border-radius:3px; background:var(--surface-2);
  }
  .heatmap-cell.active{ background:var(--ember); }
  .heatmap-cell.today-cell{ box-shadow:0 0 0 1px var(--ember-dim) inset; }

  .empty-state{
    margin-top:40px; text-align:center; color:var(--text-dim);
    padding:0 20px;
  }
  .empty-state .display{ color:var(--text); font-size:18px; margin-bottom:6px; }

  .coming-soon{
    margin-top:60px; text-align:center; color:var(--text-dim); padding:0 30px;
  }
  .coming-soon .display{ color:var(--text); font-size:20px; margin-bottom:8px; }

  /* ---------- AGENDA ---------- */
  .cal-header{
    display:flex; align-items:center; justify-content:space-between;
    margin:14px 4px 12px;
  }
  .cal-header button{
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    width:34px; height:34px; border-radius:10px; font-size:16px;
  }
  .cal-title{ font-family:'Fraunces',serif; font-size:17px; text-transform:capitalize; }
  .cal-weekdays{
    display:grid; grid-template-columns:repeat(7,1fr);
    text-align:center; font-size:11px; color:var(--text-dim);
    margin-bottom:6px; letter-spacing:.04em;
  }
  .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
    margin-bottom:22px;
  }
  .cal-cell{
    aspect-ratio:1; border-radius:10px; background:var(--surface);
    border:1px solid transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:13px; color:var(--text); position:relative;
  }
  .cal-cell.empty{ background:transparent; }
  .cal-cell.today{ border-color:var(--ember-dim); }
  .cal-cell.selected{ background:var(--ember); color:#1a1408; font-weight:600; }
  .cal-cell .dot{
    width:4px; height:4px; border-radius:50%; background:var(--ember);
    position:absolute; bottom:6px;
  }
  .cal-cell.selected .dot{ background:#1a1408; }
  .day-panel{ border-top:1px solid var(--border); padding-top:16px; }
  .appt-row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; margin-bottom:10px;
  }
  .appt-row .time{
    font-family:'Fraunces',serif; font-weight:600; color:var(--ember);
    font-size:14px; min-width:44px;
  }
  .appt-row .title{ flex:1; font-size:14px; }
  .appt-row .del-btn{ background:none; border:none; color:var(--text-dim); font-size:11px; }
  .empty-day{ color:var(--text-dim); font-size:13px; padding:6px 4px; }

  /* ---------- NOTE ---------- */
  .note-input{
    width:100%; min-height:96px; background:var(--surface);
    border:1px solid var(--border); border-radius:14px; color:var(--text);
    font-family:'Inter',sans-serif; font-size:15px; padding:14px;
    resize:vertical; margin:14px 0 10px;
  }
  .note-input::placeholder{ color:var(--text-dim); }
  .note-save{
    background:var(--ember); color:#1a1408; border:none;
    border-radius:12px; padding:11px 18px; font-weight:600; font-size:14px;
    margin-bottom:22px;
  }
  .note-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px; margin-bottom:10px;
  }
  .note-card .note-date{ font-size:11px; color:var(--text-dim); margin-bottom:6px; }
  .note-card .note-text{ font-size:14px; white-space:pre-wrap; line-height:1.5; }
  .note-card .del-btn{ margin-top:8px; }

  /* ---------- FITNESS: PESO ---------- */
  .weekday-pill{
    background:var(--surface); border:1px solid var(--border); color:var(--text-dim);
    border-radius:10px; padding:10px 0; font-size:12px; text-align:center;
  }
  .weekday-pill.today{ border-color:var(--ember-dim); }
  .weekday-pill.selected{ background:var(--ember); color:#1a1408; font-weight:600; border-color:var(--ember); }

  .weight-card{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:18px; margin:14px 0 22px;
  }
  .weight-value-row{
    display:flex; align-items:flex-start; justify-content:space-between; margin:6px 0 14px;
  }
  .weight-value{ font-family:'Fraunces',serif; font-size:32px; font-weight:600; color:var(--ember); }
  .weight-value .unit{ font-size:16px; color:var(--text-dim); font-weight:400; margin-left:4px; }
  .weight-updated{ font-size:11px; color:var(--text-dim); margin-top:2px; }
  .weight-input-row{ display:flex; gap:8px; }
  .weight-input-row input{
    flex:1; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:11px 12px; font-size:14px;
  }
  .weight-input-row button{
    background:var(--ember); color:#1a1408; border:none;
    border-radius:10px; padding:0 18px; font-weight:600; font-size:14px;
  }

  /* ---------- FITNESS: SCHEDA ---------- */
  .workout-day-row{
    display:grid; grid-template-columns:repeat(4,1fr); gap:6px;
    margin:14px 0 16px;
  }
  .workout-day-row .weekday-pill{ font-size:11px; padding:10px 4px; }
  .workout-day-label{
    font-family:'Fraunces',serif; font-size:15px; color:var(--text-dim);
    margin:0 4px 14px;
  }
  .exercise-row{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .exercise-name{ font-size:14px; font-weight:600; }
  .exercise-meta{ font-size:12px; color:var(--text-dim); margin-top:2px; }
  .exercise-inputs{ display:flex; gap:8px; margin-top:10px; }
  .exercise-inputs input{
    flex:1; min-width:0; background:var(--surface-2); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:9px 10px; font-size:14px;
  }
  .exercise-prev{ font-size:12px; color:var(--text-dim); margin-top:8px; }

  /* ---------- FITNESS: ALIMENTAZIONE ---------- */
  .macro-row{
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    margin:14px 0 20px;
  }
  .macro-cell{
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:10px 6px; text-align:center;
  }
  .macro-cell .val{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--ember); }
  .macro-cell .lbl{ font-size:10px; color:var(--text-dim); margin-top:2px; }
  .meal-card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .meal-card .meal-title{ font-size:14px; font-weight:600; display:flex; justify-content:space-between; }
  .meal-card .meal-kcal{ font-size:12px; color:var(--ember); font-weight:600; }
  .meal-card .meal-items{ font-size:13px; color:var(--text-dim); line-height:1.6; margin-top:6px; }
  .meal-note{ font-size:12px; color:var(--text-dim); margin:14px 4px 4px; line-height:1.6; }

  /* ---------- NOTIZIE ---------- */
  .news-cat{ margin:14px 0 20px; }
  .news-link{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; margin-bottom:8px;
    color:var(--text); text-decoration:none; font-size:14px;
  }
  .news-link .arrow{ color:var(--text-dim); font-size:14px; }

  /* ---------- HOME ---------- */
  @keyframes cardIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:none; }
  }
  .home-card{
    animation:cardIn .45s ease both;
  }
  .home-card:nth-child(1){ animation-delay:.03s; }
  .home-card:nth-child(2){ animation-delay:.09s; }
  .home-card:nth-child(3){ animation-delay:.15s; }
  .home-card:nth-child(4){ animation-delay:.21s; }

  .home-quote{
    font-family:'Fraunces',serif; font-size:16px; font-style:italic;
    color:var(--text-dim); line-height:1.5; margin:16px 4px 22px;
  }
  .home-quote::before{ content:"\201C"; color:var(--ember); font-style:normal; }
  .home-quote::after{ content:"\201D"; color:var(--ember); font-style:normal; }

  .home-section-head{
    display:flex; align-items:center; justify-content:space-between;
    margin:4px 4px 10px;
  }
  .home-section-head .section-title{ margin:0; }

  .btn-text{
    background:none; border:none; color:var(--ember);
    font-size:13px; font-weight:600; padding:6px 2px;
    transition:opacity .15s ease;
  }
  .btn-text:active{ opacity:.6; transform:scale(.97); }

  .highlight-grid{ display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
  .highlight-card{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:14px 16px; display:flex; align-items:center; gap:14px;
  }
  .highlight-card .flame{ width:38px; height:38px; }
  .highlight-card .flame .count{ font-size:13px; }
  .highlight-info{ flex:1; min-width:0; }
  .highlight-info .name{ font-size:14px; font-weight:600; }
  .progress-track{
    height:5px; border-radius:3px; background:var(--surface-2);
    margin-top:8px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--ember); border-radius:3px;
    transition:width .4s ease;
  }
  .quick-check{
    width:36px; height:36px; border-radius:50%; flex:none;
    border:2px solid var(--ember-dim); background:transparent; color:var(--ember);
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition:transform .15s ease;
  }
  .quick-check:active{ transform:scale(.9); }
  .quick-check.done{ background:var(--ember); border-color:var(--ember); color:#1a1408; }

  .today-appt-row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; margin-bottom:8px;
  }
  .today-appt-row .time{ font-family:'Fraunces',serif; font-weight:600; color:var(--ember); font-size:14px; min-width:44px; }
  .today-appt-row .title{ flex:1; font-size:14px; }

  .mood-summary{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px 16px; font-size:14px; display:flex; align-items:center; gap:10px;
  }
  .mood-summary .emoji{ font-size:20px; }

  .btn-primary-sm{
    display:block; width:100%; text-align:center;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:12px; font-size:13px; font-weight:600;
    margin-top:10px; transition:transform .15s ease;
  }
  .btn-primary-sm:active{ transform:scale(.98); }

  /* ---------- MOOD MODAL ---------- */
  #moodOverlay{
    position:fixed; inset:0; z-index:90;
    background:rgba(6,7,8,0.6); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:28px; opacity:0; visibility:hidden;
    transition:opacity .3s ease, visibility .3s ease;
  }
  #moodOverlay.visible{ opacity:1; visibility:visible; }
  .mood-modal{
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:26px 22px; width:100%; max-width:320px; text-align:center;
    transform:scale(.92) translateY(8px); transition:transform .3s ease;
  }
  #moodOverlay.visible .mood-modal{ transform:none; }
  .mood-modal h3{ font-size:17px; margin:0 0 18px; }
  .mood-options{ display:flex; justify-content:space-between; gap:6px; }
  .mood-option{
    background:none; border:none; display:flex; flex-direction:column;
    align-items:center; gap:6px; font-size:26px; padding:6px 2px;
    color:var(--text-dim); flex:1; border-radius:12px;
    transition:transform .15s ease, background .15s ease;
  }
  .mood-option:active{ transform:scale(.88); background:var(--surface-2); }
